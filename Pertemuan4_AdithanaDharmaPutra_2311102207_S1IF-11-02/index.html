<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fetch Profil</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    #hasil-profil {
      margin-top: 15px;
      padding: 10px;
      border: 1px solid #ddd;
      display: none;
      background-color: #f9f9f9;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
      background-color: green;
      color: white;
      border: none;
      border-radius: 4px;
    }

    button:hover {
      background-color: green;
    }
  </style>
</head>

<body>
  <h2>Data Profil Pengguna</h2>

  <button id="btn-tampilkan">Tampilkan Profil</button>

  <div id="hasil-profil"></div>

  <script>
    $(document).ready(function () {
      $("#btn-tampilkan").on("click", function () {
        $.ajax({
          url: "Data.php",
          type: "GET",
          dataType: "json",
          success: function (data) {
            const wadah = $("#hasil-profil");
            wadah.empty();

            $.each(data, function (index, item) {
              const isiBaris = `<p>${index + 1}. Nama: <strong>${item.nama}</strong> | 
                              Pekerjaan: <strong>${item.pekerjaan}</strong> | 
                              Lokasi: <strong>${item.lokasi}</strong></p>`;
              wadah.append(isiBaris);
            });

            wadah.show();
          },
          error: function (xhr, status, error) {
            console.error("Terjadi kesalahan:", error);
            alert("Gagal memuat data.");
          },
        });
      });
    });
  </script>
</body>

</html>
